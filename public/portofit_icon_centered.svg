<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg" style=""><defs><mask id="imagine-text-gaps-bvlpla" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="600" fill="white"/><rect x="250.1640625" y="306" width="179.671875" height="54" fill="black" rx="2"/><rect x="288.875" y="354" width="102.25" height="54" fill="black" rx="2"/><rect x="217.875" y="426" width="244.25" height="19" fill="black" rx="2"/></mask></defs>
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Ícone PortoFit centralizado</title>
